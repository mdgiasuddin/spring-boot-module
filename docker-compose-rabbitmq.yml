services:
  rabbitmq:
    image: rabbitmq:4.3.0-management
    container_name: rabbitmq_test
    hostname: rabbitmq
    restart: unless-stopped

    ports:
      - "5772:5672"
      - "15772:15672"

    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  rabbitmq_data: